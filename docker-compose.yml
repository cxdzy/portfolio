version: '3.8'

services:
  backend:
    build: ./backend
    container_name: portfolio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: your_vps_ip
      DB_PORT: 3306
      DB_USER: your_db_user
      DB_PASSWORD: your_db_password
      DB_NAME: portfolio
      PORT: 3001
      # Change this to your VPS public IP or domain
      BASE_URL: http://your_vps_ip:3001
    volumes:
      - uploads_data:/app/uploads

volumes:
  uploads_data:
